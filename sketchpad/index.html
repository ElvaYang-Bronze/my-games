<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>电子画板</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(160deg, #0b1220, #0f172a 40%, #111827);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px;
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(8px);
      background: rgba(15, 23, 42, 0.9);
      border-bottom: 1px solid rgba(148, 163, 184, 0.25);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      max-width: 960px;
      margin: 0 auto;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .btn, input[type="color"], input[type="range"] {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
    }

    .btn {
      cursor: pointer;
      border: 1px solid rgba(148, 163, 184, 0.25);
    }

    .btn.active {
      background: #0ea5e9;
      color: #fff;
      border-color: #38bdf8;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-left: 2px;
    }

    .stage {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .canvas-wrap {
      width: min(100%, 980px);
      height: min(72vh, 780px);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 8px 35px rgba(2, 8, 23, 0.6);
      background: #fff;
      touch-action: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      background: #fff;
    }

    @media (max-width: 768px) {
      header { padding: 10px 8px; }
      .btn, input[type="color"], input[type="range"] { font-size: 13px; padding: 8px 10px; }
      .canvas-wrap {
        height: calc(100vh - 180px);
        border-radius: 10px;
      }
      .hint {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="toolbar">
      <div class="row">
        <button class="btn active" id="brushBtn">画笔</button>
        <button class="btn" id="eraserBtn">橡皮擦</button>
        <label class="btn" for="color">颜色</label>
        <input id="color" type="color" value="#111827" />
        <label class="btn" for="size">粗细</label>
        <input id="size" type="range" min="1" max="40" value="6" />
      </div>
      <div class="row">
        <button class="btn" id="undoBtn">撤销</button>
        <button class="btn" id="clearBtn">清空</button>
        <button class="btn" id="saveBtn">保存图片</button>
        <span class="hint">支持鼠标和手指绘制，可横竖屏使用</span>
      </div>
    </div>
  </header>

  <main class="stage">
    <div class="canvas-wrap" id="wrap">
      <canvas id="board"></canvas>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('board');
    const wrap = document.getElementById('wrap');
    const ctx = canvas.getContext('2d');

    const brushBtn = document.getElementById('brushBtn');
    const eraserBtn = document.getElementById('eraserBtn');
    const colorInput = document.getElementById('color');
    const sizeInput = document.getElementById('size');
    const clearBtn = document.getElementById('clearBtn');
    const undoBtn = document.getElementById('undoBtn');
    const saveBtn = document.getElementById('saveBtn');

    let drawing = false;
    let tool = 'brush';
    let history = [];
    const maxHistory = 20;

    function resizeCanvas() {
      const ratio = window.devicePixelRatio || 1;
      const prev = snapshot();
      canvas.width = Math.floor(wrap.clientWidth * ratio);
      canvas.height = Math.floor(wrap.clientHeight * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      fillWhite();
      if (prev) restoreSnapshot(prev);
    }

    function fillWhite() {
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function setTool(nextTool) {
      tool = nextTool;
      brushBtn.classList.toggle('active', tool === 'brush');
      eraserBtn.classList.toggle('active', tool === 'eraser');
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function beginDraw(e) {
      drawing = true;
      const { x, y } = getPos(e);
      ctx.beginPath();
      ctx.moveTo(x, y);
      draw(e);
    }

    function draw(e) {
      if (!drawing) return;
      const { x, y } = getPos(e);
      ctx.lineWidth = Number(sizeInput.value);

      if (tool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = colorInput.value;
      }

      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    function endDraw() {
      if (!drawing) return;
      drawing = false;
      ctx.beginPath();
      pushHistory();
    }

    function snapshot() {
      if (!canvas.width || !canvas.height) return null;
      return canvas.toDataURL('image/png');
    }

    function restoreSnapshot(dataURL) {
      const img = new Image();
      img.onload = () => {
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(img, 0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
      };
      img.src = dataURL;
    }

    function pushHistory() {
      history.push(snapshot());
      if (history.length > maxHistory) history.shift();
    }

    brushBtn.addEventListener('click', () => setTool('brush'));
    eraserBtn.addEventListener('click', () => setTool('eraser'));

    clearBtn.addEventListener('click', () => {
      fillWhite();
      pushHistory();
    });

    undoBtn.addEventListener('click', () => {
      if (history.length <= 1) {
        fillWhite();
        history = [snapshot()];
        return;
      }
      history.pop();
      restoreSnapshot(history[history.length - 1]);
    });

    saveBtn.addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = `sketch-${Date.now()}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    });

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      beginDraw(e);
    });
    canvas.addEventListener('pointermove', (e) => {
      e.preventDefault();
      draw(e);
    });
    canvas.addEventListener('pointerup', (e) => {
      e.preventDefault();
      endDraw();
    });
    canvas.addEventListener('pointercancel', endDraw);
    canvas.addEventListener('pointerleave', endDraw);

    window.addEventListener('resize', () => {
      clearTimeout(window.__resizeTimer);
      window.__resizeTimer = setTimeout(resizeCanvas, 120);
    });

    resizeCanvas();
    pushHistory();
  </script>
</body>
</html>
