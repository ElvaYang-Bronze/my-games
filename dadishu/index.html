<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>我的小游戏合集</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1724;
  color:white;
  text-align:center;
}

h1{
  margin:20px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#1e293b;
  border-radius:12px;
  padding:20px;
  text-decoration:none;
  color:white;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.05);
  background:#334155;
}

.icon{
  font-size:40px;
  margin-bottom:10px;
}

.name{
  font-size:16px;
}
</style>
</head>

<body>

<h1>🎮 我的小游戏合集</h1>

<div class="grid">

  <a class="card" href="tetris/">
    <div class="icon">🧱</div>
    <div class="name">俄罗斯方块</div>
  </a>

  <a class="card" href="mole/">
    <div class="icon">🐹</div>
    <div class="name">打地鼠</div>
  </a>

</div>

</body>
</html>
